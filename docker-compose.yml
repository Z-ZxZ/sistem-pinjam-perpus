version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: perpus_db
    environment:
      POSTGRES_USER: perpus_user
      POSTGRES_PASSWORD: perpus_password
      POSTGRES_DB: perpus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: perpus_cache
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perpus_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: perpus_user
      DB_PASSWORD: perpus_password
      DB_NAME: perpus_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: super_secret_key_change_me_in_production
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: perpus_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
